services:
  api:
    build:
      context: ..
      dockerfile: src/StarterKit.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on: [sqlserver, redis]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=ForgeStarterDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379"
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports: ["1433:1433"]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forgestarter
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
