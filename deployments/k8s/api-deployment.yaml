apiVersion: apps/v1
kind: Deployment
metadata: { name: forgestarter-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: forgestarter-api } }
  template:
    metadata: { labels: { app: forgestarter-api } }
    spec:
      containers:
      - name: api
        image: forgestarter-api:latest
        ports: [{ containerPort: 8080 }]
        envFrom: [{ configMapRef: { name: forgestarter-config } }]
